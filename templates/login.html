{% extends "base.html" %}
{% block title %}Login - Onlimo DLH{% endblock %}

{% block content %}
<div class="login-wrapper">
    <div class="login-card card">
        <div class="card-header">
            <div class="mb-2">
                <i class="bi bi-water" style="font-size: 2.5rem; color: var(--primary);"></i>
            </div>
            <h3 class="mb-0">Onlimo DLH</h3>
            <p class="text-muted mb-0" style="font-size: 0.85rem;">Water Quality Monitoring System</p>
        </div>
        <div class="card-body">
            <form method="POST">
                <div class="mb-3">
                    <label for="username" class="form-label">Username</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-person"></i></span>
                        <input type="text" class="form-control" id="username" name="username"
                               placeholder="Masukkan username" required autofocus>
                    </div>
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <div class="input-group">
                        <span class="input-group-text"><i class="bi bi-lock"></i></span>
                        <input type="password" class="form-control" id="password" name="password"
                               placeholder="Masukkan password" required>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="bi bi-box-arrow-in-right"></i> Login
                </button>
            </form>
        </div>
    </div>
</div>
{% endblock %}
